<!DOCTYPE html>

<head>

  <script>
    (function () {
      var stored = localStorage.getItem("theme");
      var dark = stored ? stored === "dark"

      if (dark) document.documentElement.classList.add("dark");
    })();
  </script>

    <div class="mt-6 space-y-1 font-mono text-sm text-ink-muted dark:text-fog-muted">
      <p>expected: the page you requested</p>
      <p>actual:&nbsp;&nbsp; nothing at this address</p>
    </div>
    <p class="mt-8">
      <a href="/" class="border border-line px-4 py-2 font-mono text-sm hover:border-accent hover:text-accent dark:border-line-dark dark:hover:border-accent-bright dark:hover:text-accent-bright">rerun from the start</a>
    </p>
