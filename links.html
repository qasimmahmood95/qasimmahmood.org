<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Links | Qasim Mahmood</title>
  <meta name="description" content="Qasim Mahmood, Senior SDET. GitHub, LinkedIn, site and email in one place.">
  <link rel="canonical" href="https://qasimmahmood.org/links">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230e7466'/%3E%3Ctext x='16' y='22' font-family='monospace' font-size='18' font-weight='bold' fill='%23faf9f6' text-anchor='middle'%3EQ%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/site.css">
  <script>
    // Set theme before first paint to avoid a flash of the wrong mode.
    (function () {
      var stored = localStorage.getItem("theme");
      var dark = stored ? stored === "dark"
        : window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (dark) document.documentElement.classList.add("dark");
    })();
  </script>
</head>
<body class="bg-paper text-ink dark:bg-coal dark:text-fog font-sans antialiased">

  <div class="topo topo-fixed" aria-hidden="true">
    <div class="topo-layer"></div>
    <div class="topo-layer topo-b"></div>
    <div class="topo-layer topo-accent"></div>
  </div>

  <div class="mx-auto flex min-h-screen w-full max-w-md flex-col px-5">

    <header class="flex items-center justify-between py-4">
      <a href="/" class="font-mono text-sm font-semibold tracking-tight hover:text-accent dark:hover:text-accent-bright">q.mahmood</a>
      <button id="theme-toggle" type="button" aria-label="Toggle dark mode"
        class="rounded p-2 text-ink-muted hover:text-ink dark:text-fog-muted dark:hover:text-fog">
        <svg class="hidden dark:block" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
        </svg>
        <svg class="block dark:hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/>
        </svg>
      </button>
    </header>

    <main class="flex flex-1 flex-col justify-center py-10">
      <p class="text-center font-mono text-sm text-accent dark:text-accent-bright">links</p>
      <h1 class="mt-3 text-center text-3xl font-bold tracking-tight">Qasim Mahmood</h1>
      <p class="mt-3 text-center text-sm leading-relaxed text-ink-muted dark:text-fog-muted">
        Senior SDET. Regulated fintech and digital assets.
      </p>

      <nav aria-label="Links">
        <ul id="links-root" class="mt-10 space-y-3"></ul>
      </nav>

      <noscript>
        <ul class="mt-10 space-y-3 font-mono text-sm">
          <li><a class="block border border-line px-5 py-4 dark:border-line-dark" href="https://github.com/qasimmahmood95">GitHub</a></li>
          <li><a class="block border border-line px-5 py-4 dark:border-line-dark" href="https://www.linkedin.com/in/qmahmood95">LinkedIn</a></li>
          <li><a class="block border border-line px-5 py-4 dark:border-line-dark" href="https://qasimmahmood.org/">Main site</a></li>
          <li class="border border-line px-5 py-4 dark:border-line-dark">email: qasim.mahmood13 [at] alumni.imperial.ac.uk</li>
        </ul>
      </noscript>
    </main>

    <footer class="py-6 text-center font-mono text-xs text-ink-muted dark:text-fog-muted">
      <a href="/" class="hover:text-accent dark:hover:text-accent-bright">qasimmahmood.org</a>
    </footer>

  </div>

  <script>
    // Assembled at runtime so the address isn't in the static HTML.
    var EMAIL = ["qasim.mahmood13", "alumni.imperial.ac.uk"].join("@");

    // One entry per button; edits are one-line changes.
    var LINKS = [
      { label: "GitHub", detail: "github.com/qasimmahmood95", href: "https://github.com/qasimmahmood95" },
      { label: "LinkedIn", detail: "linkedin.com/in/qmahmood95", href: "https://www.linkedin.com/in/qmahmood95" },
      { label: "Main site", detail: "qasimmahmood.org", href: "https://qasimmahmood.org/" },
      { label: "Email", detail: EMAIL, href: "mailto:" + EMAIL },
    ];

    var root = document.getElementById("links-root");
    LINKS.forEach(function (item) {
      var li = document.createElement("li");
      var a = document.createElement("a");
      a.href = item.href;
      a.className = "flex min-h-14 flex-wrap items-center justify-between gap-x-4 gap-y-1 border border-line px-5 py-4 hover:border-accent hover:text-accent dark:border-line-dark dark:hover:border-accent-bright dark:hover:text-accent-bright";

      var label = document.createElement("span");
      label.className = "font-semibold";
      label.textContent = item.label;

      var detail = document.createElement("span");
      detail.className = "font-mono text-xs text-ink-muted dark:text-fog-muted";
      detail.textContent = item.detail;

      a.append(label, detail);
      li.appendChild(a);
      root.appendChild(li);
    });

    document.getElementById("theme-toggle").addEventListener("click", function () {
      var dark = document.documentElement.classList.toggle("dark");
      localStorage.setItem("theme", dark ? "dark" : "light");
    });
  </script>
</body>
</html>
