name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build

      - name: Validate HTML
        run: npx --yes html-validate index.html 404.html links.html

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # LinkedIn returns 999 to bots. Own-domain URLs (canonical, og:url)
          # are self-referential and 404 until the new site replaces the old
          # one at the domain, so they're excluded too.
          args: >-
            --no-progress
            --root-dir ${{ github.workspace }}
            --exclude 'linkedin\.com'
            --exclude 'qasimmahmood\.org'
            index.html 404.html links.html
          fail: true

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright suite
        run: npm test
